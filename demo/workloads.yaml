---
apiVersion: v1
kind: Namespace
metadata:
  name: acme-prod
  labels:
    app.kubernetes.io/part-of: reflex-demo
---
# ── Services ──
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway-sa
  namespace: acme-prod
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-sa
  namespace: acme-prod
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: analytics-sa
  namespace: acme-prod
---
# ── Deployments ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: acme-prod
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      serviceAccountName: api-gateway-sa
      containers:
        - name: api-gateway
          image: nginx:1.21.6
          ports:
            - containerPort: 80
          securityContext:
            runAsRoot: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: acme-prod
  labels:
    app: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      serviceAccountName: payment-sa
      containers:
        - name: payment-service
          image: python:3.8.12
          command: ["python3", "-m", "http.server", "8000"]
          ports:
            - containerPort: 8000
          securityContext:
            privileged: true
            runAsUser: 0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-auth
  namespace: acme-prod
  labels:
    app: user-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-auth
  template:
    metadata:
      labels:
        app: user-auth
    spec:
      containers:
        - name: user-auth
          image: node:16.14.0
          command: ["node", "-e", "require('http').createServer((req,res)=>{res.end('ok')}).listen(3000)"]
          ports:
            - containerPort: 3000
          env:
            - name: DB_PASSWORD
              value: "s3cret-demo-password"
            - name: JWT_SECRET
              value: "super-secret-jwt-key"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-engine
  namespace: acme-prod
  labels:
    app: analytics-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-engine
  template:
    metadata:
      labels:
        app: analytics-engine
    spec:
      serviceAccountName: analytics-sa
      containers:
        - name: analytics-engine
          image: python:3.8.12
          command: ["python3", "-m", "http.server", "5000"]
          ports:
            - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: acme-prod
  labels:
    app: search-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      containers:
        - name: search-service
          image: elasticsearch:7.17.7
          ports:
            - containerPort: 9200
          securityContext:
            allowPrivilegeEscalation: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: acme-prod
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: node:18.12.0
          command: ["node", "-e", "require('http').createServer((req,res)=>{res.end('ok')}).listen(4000)"]
          ports:
            - containerPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: acme-prod
  labels:
    app: cart-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
        - name: cart-service
          image: redis:6.2.7
          ports:
            - containerPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-processor
  namespace: acme-prod
  labels:
    app: order-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-processor
  template:
    metadata:
      labels:
        app: order-processor
    spec:
      containers:
        - name: order-processor
          image: golang:1.19.5
          command: ["sleep", "infinity"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: acme-prod
  labels:
    app: inventory-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: golang:1.21.5
          command: ["sleep", "infinity"]
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logging-agent
  namespace: acme-prod
  labels:
    app: logging-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logging-agent
  template:
    metadata:
      labels:
        app: logging-agent
    spec:
      containers:
        - name: logging-agent
          image: fluent/fluentd:v1.14
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
---
# ── Services ──
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: acme-prod
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: acme-prod
spec:
  selector:
    app: payment-service
  ports:
    - port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: user-auth
  namespace: acme-prod
spec:
  selector:
    app: user-auth
  ports:
    - port: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-engine
  namespace: acme-prod
spec:
  selector:
    app: analytics-engine
  ports:
    - port: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: acme-prod
spec:
  selector:
    app: search-service
  ports:
    - port: 9200
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: acme-prod
spec:
  selector:
    app: notification-service
  ports:
    - port: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: acme-prod
spec:
  selector:
    app: cart-service
  ports:
    - port: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: order-processor
  namespace: acme-prod
spec:
  selector:
    app: order-processor
  ports:
    - port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: acme-prod
spec:
  selector:
    app: inventory-service
  ports:
    - port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: logging-agent
  namespace: acme-prod
spec:
  selector:
    app: logging-agent
  ports:
    - port: 24224
---
# ── NetworkPolicies (only 3, leaving most pods unprotected) ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: inventory-restrict
  namespace: acme-prod
spec:
  podSelector:
    matchLabels:
      app: inventory-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: order-processor
      ports:
        - port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: cart-service
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: logging-restrict
  namespace: acme-prod
spec:
  podSelector:
    matchLabels:
      app: logging-agent
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: order-processor-restrict
  namespace: acme-prod
spec:
  podSelector:
    matchLabels:
      app: order-processor
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: inventory-service
    - to:
        - podSelector:
            matchLabels:
              app: cart-service
---
# ── RBAC: risky bindings for demo ──
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: acme-prod
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payment-secret-access
  namespace: acme-prod
subjects:
  - kind: ServiceAccount
    name: payment-sa
    namespace: acme-prod
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: analytics-cluster-admin
subjects:
  - kind: ServiceAccount
    name: analytics-sa
    namespace: acme-prod
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
