# ═══════════════════════════════════════
# NETWORK POLICIES  (sparse — most pods unprotected)
# ═══════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: inventory-restrict
  namespace: acme-prod
spec:
  podSelector:
    matchLabels:
      app: inventory-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: order-processor
      ports:
        - port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: cart-service
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: logging-restrict
  namespace: acme-prod
spec:
  podSelector:
    matchLabels:
      app: logging-agent
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: order-processor-restrict
  namespace: acme-prod
spec:
  podSelector:
    matchLabels:
      app: order-processor
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: inventory-service
    - to:
        - podSelector:
            matchLabels:
              app: cart-service
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-restrict
  namespace: acme-prod
spec:
  podSelector:
    matchLabels:
      app: postgres-primary
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              team: data-platform
      ports:
        - port: 5432
    - from:
        - podSelector:
            matchLabels:
              app: analytics-engine
      ports:
        - port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vault-restrict
  namespace: acme-prod
spec:
  podSelector:
    matchLabels:
      app: vault
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              team: security
      ports:
        - port: 8200
    - from:
        - podSelector:
            matchLabels:
              app: payment-service
      ports:
        - port: 8200
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: policy-agent-restrict
  namespace: acme-prod
spec:
  podSelector:
    matchLabels:
      app: policy-agent
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - port: 8181
---
# ═══════════════════════════════════════
# RBAC — risky bindings for demo
# ═══════════════════════════════════════
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: acme-prod
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payment-secret-access
  namespace: acme-prod
subjects:
  - kind: ServiceAccount
    name: payment-sa
    namespace: acme-prod
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: analytics-cluster-admin
subjects:
  - kind: ServiceAccount
    name: analytics-sa
    namespace: acme-prod
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: acme-prod
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sre-pod-reader
  namespace: acme-prod
subjects:
  - kind: ServiceAccount
    name: sre-sa
    namespace: acme-prod
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ml-secret-access
  namespace: acme-prod
subjects:
  - kind: ServiceAccount
    name: ml-sa
    namespace: acme-prod
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: security-cluster-admin
subjects:
  - kind: ServiceAccount
    name: security-sa
    namespace: acme-prod
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: data-platform-secret-access
  namespace: acme-prod
subjects:
  - kind: ServiceAccount
    name: data-platform-sa
    namespace: acme-prod
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io
