apiVersion: v1
kind: Namespace
metadata:
  name: plexar-system
  labels:
    app.kubernetes.io/name: plexar
    app.kubernetes.io/part-of: plexar
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: plexar
  namespace: plexar-system
  labels:
    app.kubernetes.io/name: plexar
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: plexar-reader
  labels:
    app.kubernetes.io/name: plexar
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "namespaces", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["aquasecurity.github.io"]
    resources: ["vulnerabilityreports"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: plexar-reader-binding
  labels:
    app.kubernetes.io/name: plexar
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: plexar-reader
subjects:
  - kind: ServiceAccount
    name: plexar
    namespace: plexar-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plexar
  namespace: plexar-system
  labels:
    app.kubernetes.io/name: plexar
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app:.plexar
  template:
    metadata:
      labels:
        app:.plexar
        app.kubernetes.io/name: plexar
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName:.plexar
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: plexar
          image: ghcr.io/plexar-security/plexar:latest
          args:
            - serve
            - --namespace=default
            - --ui
            - --scan-interval=5m
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: PLEXAR_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name:.plexar-license
                  key: license-key
                  optional: true
            - name: PLEXAR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: history
              mountPath: /home/nonroot/.plexar
      volumes:
        - name: history
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: plexar
  namespace: plexar-system
  labels:
    app.kubernetes.io/name: plexar
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app:.plexar
---
apiVersion: v1
kind: Secret
metadata:
  name:.plexar-license
  namespace: plexar-system
  labels:
    app.kubernetes.io/name: plexar
type: Opaque
stringData:
  license-key: ""
